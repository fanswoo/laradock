# Sync Streams 定義（edition 3 語法）
#
# PowerSync 1.20.5 edition 3 函式 schema（grep 自 /app/packages/sync-rules/dist/compiler/sqlite.js:102）：
#   合法 schema 只有 auth / subscription / connection，其他會回 "Invalid schema in function name"
#   auth.user_id()                — JWT sub claim（字串；PHP controller 做 (string) 轉型）
#   auth.parameter('user_id')     — JWT parameters.user_id（整數）
#   auth.parameter('user_type')   — JWT parameters.user_type
#   subscription.parameter('x')   — 前端 db.syncStream(name, {x}) 傳入的 subscription 參數
#
# ⚠️ 禁用 SQL alias：PowerSync 會把 alias 當 output table name 存進 bucket（`table: "c"`），
# client 端沒有 ps_data__c 這種 table，資料會被丟掉。必須用完整 table 名稱寫 query。
#
# 架構備忘：edition 3 不允許 row column 與 parameter 間使用 >=/<= 等 range 運算子，
# 因此無法靠 subscription.parameter('since_cursor') 動態收縮同步範圍。
# 捲動範圍改由前端 SQLite 本地 WHERE updated_at >= cursor 篩選。

streams:
  # 使用者的對話列表 — 自動訂閱
  my_conversations:
    auto_subscribe: true
    query: |
      SELECT chat_conversations.*
      FROM chat_conversations
      INNER JOIN chat_conversation_participants
        ON chat_conversations.id = chat_conversation_participants.conversation_id
      WHERE chat_conversation_participants.participant_id = auth.parameter('user_id')
        AND chat_conversations.deleted_at IS NULL

  # 使用者的參與者記錄 — 自動訂閱
  # 用 IN subquery 取代 self-join；避開 alias 問題
  my_participants:
    auto_subscribe: true
    query: |
      SELECT chat_conversation_participants.*
      FROM chat_conversation_participants
      WHERE chat_conversation_participants.conversation_id IN (
        SELECT conversation_id
        FROM chat_conversation_participants
        WHERE participant_id = auth.parameter('user_id')
      )

  # 對話的訊息 — 按需訂閱
  conversation_messages:
    query: |
      SELECT chat_messages.*
      FROM chat_messages
      INNER JOIN chat_conversation_participants
        ON chat_conversation_participants.conversation_id = chat_messages.conversation_id
      WHERE chat_messages.conversation_id = subscription.parameter('conversation_id')
        AND chat_conversation_participants.participant_id = auth.parameter('user_id')
        AND chat_messages.deleted_at IS NULL

  # 訊息的 reactions — 按需訂閱
  message_reactions:
    query: |
      SELECT chat_message_reactions.*
      FROM chat_message_reactions
      INNER JOIN chat_messages
        ON chat_messages.id = chat_message_reactions.message_id
      INNER JOIN chat_conversation_participants
        ON chat_conversation_participants.conversation_id = chat_messages.conversation_id
      WHERE chat_messages.conversation_id = subscription.parameter('conversation_id')
        AND chat_conversation_participants.participant_id = auth.parameter('user_id')
        AND chat_messages.deleted_at IS NULL

config:
  edition: 3
